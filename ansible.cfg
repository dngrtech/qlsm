[defaults]
# Point to the directory containing inventory files (static and generated)
inventory = ansible/inventory/
allow_world_readable_tmpfiles = True
deprecation_warnings = False
timeout = 30
host_key_checking = False # Disable host key checking
# Additional security settings that help with permission issues
pipelining = True
remote_tmp = /tmp/ansible-${USER}

[inventory]
# Plugin settings are usually auto-detected based on file content/extension
# when the inventory directory is specified in [defaults].

[privilege_escalation]
# Attempt to prevent ACL usage for become_user tmp files
# -H: Set HOME environment variable
# -S: Run command via shell (needed for complex commands)
# -n: Do not use ACLs for temporary file permissions
become_flags = -H -S -n
no_target_syslog = True
system_warnings = False

[ssh_connection]
# Set to a high enough number to ensure all file operations complete correctly
# and force SSH transport to use SFTP instead of SCP (which might handle permissions differently)
scp_if_ssh = False
sftp_batch_mode = True
# Additional ssh args to avoid ACL usage
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
