---
- name: Update QLDS Instance LAN Rate Settings
  hosts: all
  become: yes
  gather_facts: false

  vars:
    # Instance specific vars (passed via -e)
    game_port: "{{ port }}"
    firewall_mode_effective: "{{ firewall_mode | default('full') }}"
    # lan_rate_enabled: passed from task logic
    # qlds_args: passed from task logic

  tasks:
  #######################################################################
  # 1. Re-render systemd service file with updated qlds_args
  #######################################################################
    - name: Render QLDS systemd service file
      ansible.builtin.template:
        src: ../templates/qlds@.service.j2
        dest: /etc/systemd/system/qlds@{{ game_port }}.service
        owner: root
        group: root
        mode: '0644'
      notify: reload systemd daemon

    - name: Flush handlers to ensure daemon_reload runs before service restart
      ansible.builtin.meta: flush_handlers

    - name: Write QLSM network rules config
      template:
        src: ../templates/qlsm-network-rules.json.j2
        dest: /etc/qlsm/network-rules.json
        owner: root
        group: root
        mode: '0644'
      when: firewall_mode_effective == 'helper'

    - name: Apply QLSM network rules
      systemd:
        name: qlsm-network-rules.service
        state: started
      when: firewall_mode_effective == 'helper'

  #######################################################################
  # 2. Add or remove NAT iptables rules based on lan_rate_enabled
  #######################################################################
    - name: Reconcile LAN rate network rules
      ansible.builtin.import_tasks: tasks/reconcile_lan_rate_network.yml

  #######################################################################
  # 3. Restart the instance service
  #######################################################################
    - name: Restart QLDS service
      ansible.builtin.systemd:
        name: qlds@{{ game_port }}
        state: restarted
        enabled: yes

  handlers:
    - name: reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes
