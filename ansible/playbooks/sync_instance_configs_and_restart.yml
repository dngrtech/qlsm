---
- name: Sync Instance Configs and Restart QLDS Service
  hosts: all # Target host will be specified by the calling task's limit
  become: yes
  gather_facts: false

  vars:
    # Instance specific vars (passed via -e by the RQ task)
    qlds_id: "{{ id }}" # Expecting 'id' - used for config sourcing
    host_name: "{{ host_name }}" # Expecting 'host_name' for config path
    game_port: "{{ port }}" # Expecting 'port' from task call, aliasing for clarity
    firewall_mode_effective: "{{ firewall_mode | default('full') }}"

    restart_service: true # Default to true for backward compatibility

    # Instance directory on target host
    qlds_dir: "/home/ql/qlds-{{ game_port }}"

    # Shared minqlx build on target host (source of truth for instance minqlx)
    minqlx_shared_dir: "/home/ql/minqlx-shared"

  tasks:
    - name: Ensure correct ownership of minqlx-plugins directory
      ansible.builtin.file:
        path: "{{ qlds_dir }}/minqlx-plugins"
        owner: ql
        group: ql
        recurse: yes
        state: directory

    - name: Sync instance configs (cfg/txt/ent + folders) to baseq3
      ansible.builtin.synchronize:
        src: "../../configs/{{ host_name }}/{{ qlds_id }}/"
        dest: "{{ qlds_dir }}/baseq3/"
        private_key: "{{ ansible_ssh_private_key_file }}"
        archive: yes
        recursive: yes
        rsync_path: "sudo -u ql rsync"
        # QLSM owns cfg/txt/ent config state under baseq3; keep reserved dirs
        # excluded below and do not pass --delete-excluded.
        delete: yes
        rsync_opts:
          - "--exclude=scripts/***"
          - "--exclude=factories/***"
          - "--include=*/"
          - "--include=*.cfg"
          - "--include=*.txt"
          - "--include=*.ent"
          - "--exclude=*"
          - "--prune-empty-dirs"
      delegate_to: localhost
      become: false

    - name: Sync instance-specific scripts (minqlx plugins) from UI server
      ansible.builtin.synchronize:
        src: "../../configs/{{ host_name }}/{{ qlds_id }}/scripts/"
        dest: "{{ qlds_dir }}/minqlx-plugins/"
        private_key: "{{ ansible_ssh_private_key_file }}"
        archive: yes
        recursive: yes
        rsync_path: "sudo -u ql rsync"
        delete: yes
      delegate_to: localhost
      become: false

    - name: Ensure user-hooks directory exists on host
      ansible.builtin.file:
        path: "{{ qlds_dir }}/user-hooks"
        state: directory
        owner: ql
        group: ql
        mode: '0755'

    - name: Check whether local user-hooks directory exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../configs/{{ host_name }}/{{ qlds_id }}/user-hooks/"
      delegate_to: localhost
      become: false
      register: user_hooks_source

    - name: Sync user LD_PRELOAD hooks from UI server to instance user-hooks dir
      ansible.builtin.synchronize:
        src: "../../configs/{{ host_name }}/{{ qlds_id }}/user-hooks/"
        dest: "{{ qlds_dir }}/user-hooks/"
        private_key: "{{ ansible_ssh_private_key_file }}"
        delete: yes
        rsync_path: "sudo -u ql rsync"
        rsync_opts:
          - "--include=*.so"
          - "--exclude=*"
      delegate_to: localhost
      become: false
      when: user_hooks_source.stat.exists

    - name: Ensure system-hooks directory exists
      ansible.builtin.file:
        path: "{{ qlds_dir }}/system-hooks"
        state: directory
        owner: ql
        group: ql
        mode: '0755'

    - name: Sync built-in system hooks from UI server
      ansible.builtin.synchronize:
        src: "../../ql-assets/data/system-hooks/"
        dest: "{{ qlds_dir }}/system-hooks/"
        private_key: "{{ ansible_ssh_private_key_file }}"
        rsync_path: "sudo -u ql rsync"
        rsync_opts:
          - "--include=*.so"
          - "--exclude=*"
      delegate_to: localhost
      become: false

    - name: Backfill common minqlx-plugins to instance directory
      ansible.builtin.command:
        argv:
          - rsync
          - -a
          - --ignore-existing
          - --itemize-changes
          - /home/ql/assets/common/minqlx-plugins/
          - "{{ qlds_dir }}/minqlx-plugins/"
      become_user: ql
      register: common_minqlx_backfill
      changed_when: common_minqlx_backfill.stdout != ""

    - ansible.builtin.import_tasks: tasks/install_minqlx_deps.yml

    - name: Remove existing factory files before syncing (ensures only selected factories remain)
      ansible.builtin.shell: |
        find {{ qlds_dir }}/baseq3/scripts/ -maxdepth 1 -name '*.factories' -type f -delete
      ignore_errors: yes  # Directory may not exist on first run

    - name: Sync instance-specific factory files from UI server
      ansible.builtin.synchronize:
        src: "../../configs/{{ host_name }}/{{ qlds_id }}/factories/"
        dest: "{{ qlds_dir }}/baseq3/scripts/" # Factories go into baseq3/scripts
        private_key: "{{ ansible_ssh_private_key_file }}"
        archive: yes
        recursive: yes
        rsync_path: "sudo -u ql rsync"
        delete: no # Don't delete non-factory files (like map scripts)
      delegate_to: localhost
      become: false

    - name: Ensure correct ownership of synced configs (recursive)
      ansible.builtin.shell: |
        find {{ qlds_dir }}/baseq3 \
          -path "{{ qlds_dir }}/baseq3/scripts" -prune -o \
          -path "{{ qlds_dir }}/baseq3/factories" -prune -o \
          -type f \( -name '*.cfg' -o -name '*.txt' -o -name '*.ent' \) -print0 \
          | xargs -0 -r chown ql:ql
      changed_when: false


    # Mirror the whole shared build (binary, launcher, and the minqlx/ Python
    # package) so instances converge on the same minqlx that add_qlds_instance.yml
    # installs. Syncing only the .so leaves a stale Python package behind, which
    # silently drops patched event dispatchers.
    - name: Sync minqlx binary and runtime from shared location
      ansible.builtin.copy:
        src: "{{ minqlx_shared_dir }}/"
        dest: "{{ qlds_dir }}/"
        owner: ql
        group: ql
        mode: preserve
        remote_src: yes

    - name: Render QLDS systemd service file (Update Hostname/Args)
      ansible.builtin.template:
        src: ../templates/qlds@.service.j2
        dest: /etc/systemd/system/qlds@{{ game_port }}.service
        owner: root
        group: root
        mode: '0644'
      notify: reload systemd daemon

    - name: Flush handlers to ensure daemon_reload runs before restart
      ansible.builtin.meta: flush_handlers

    - name: Write QLSM network rules config
      template:
        src: ../templates/qlsm-network-rules.json.j2
        dest: /etc/qlsm/network-rules.json
        owner: root
        group: root
        mode: '0644'
      when: firewall_mode_effective == 'helper'

    - name: Apply QLSM network rules
      systemd:
        name: qlsm-network-rules.service
        state: started
      when: firewall_mode_effective == 'helper'

    - name: Reconcile LAN rate network rules
      ansible.builtin.import_tasks: tasks/reconcile_lan_rate_network.yml
      when: reconcile_lan_rate_network | default(false)

    - name: Restart QLDS service
      ansible.builtin.systemd:
        name: "qlds@{{ game_port }}"
        state: restarted
        # A restart means the instance is intended to run — keep it enabled so it
        # survives the next reboot (covers restart and config-apply-with-restart).
        enabled: yes
      when: restart_service | bool

    - name: Keep stopped QLDS service stopped
      ansible.builtin.systemd:
        name: "qlds@{{ game_port }}"
        state: stopped
      when: not (restart_service | bool)

  handlers:
    - name: reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes
